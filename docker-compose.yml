services:
  postgres-lab:
    image: postgres:16
    container_name: postgres_lab
    environment:
      POSTGRES_DB: "fundamentals"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    ports:
      - "5432:5432"
    volumes:
      - postgres-spring-lab:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: grafana_lab
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    ports:
      - "3000:3000"
    volumes:
      - grafana:/var/lib/grafana

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    ports:
      - "3100:3100"

volumes:
  postgres-spring-lab:
  grafana: